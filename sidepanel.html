<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Element Call Tracker</title>
    <style>
      :root {
        color-scheme: light;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        background: linear-gradient(180deg, #f5f7fb 0%, #e9eef8 100%);
        color: #172033;
      }

      main {
        padding: 16px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 16px;
      }

      .panel {
        background: rgba(255, 255, 255, 0.88);
        border: 1px solid #d3ddef;
        border-radius: 12px;
        padding: 12px;
        box-shadow: 0 8px 24px rgba(35, 54, 88, 0.08);
      }

      .grid {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 8px 12px;
        font-size: 13px;
      }

      .muted {
        color: #5e6b85;
      }

      .total {
        font-weight: 700;
      }

      .status {
        margin-top: 12px;
        font-size: 12px;
        color: #44516b;
        word-break: break-word;
        white-space: pre-wrap;
      }

      button {
        margin-top: 12px;
        width: 100%;
        border: 0;
        border-radius: 10px;
        background: #172033;
        color: white;
        padding: 10px 12px;
        font: inherit;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Element Call Tracker</h1>
      <div class="panel">
        <div class="grid">
          <div class="total">`document.createElement` calls</div>
          <div class="total" id="create-element-count">-</div>

          <div class="muted">Scope</div>
          <div>Current page load</div>
        </div>
        <button id="refresh">Refresh Count</button>
        <div class="status" id="status">Reading counts from the active tab…</div>
      </div>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
